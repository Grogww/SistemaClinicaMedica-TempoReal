<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clínica — Controle de Atendimento</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>🏥 Clínica — Controle de Atendimento</h1>
    <div id="ws-status" class="ws-status desconectado">
      <span class="indicador"></span>
      <span id="ws-texto">Conectando...</span>
    </div>
  </header>

  <main>

    <section class="card" id="secao-cadastro">
      <h2>📋 Cadastrar Paciente</h2>
      <p class="descricao">Preencha os dados para adicionar o paciente à fila de espera.</p>

      <div class="formulario">
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Ex: João da Silva" autocomplete="off" />
        </div>
        <div class="campo">
          <label for="idade">Idade</label>
          <input type="number" id="idade" placeholder="Ex: 35" min="0" max="150" />
        </div>
        <div class="campo">
          <label for="area">Área médica</label>
          <select id="area">
            <!-- Preenchido no js -->
            <option value="">Carregando áreas...</option>
          </select>
        </div>
        <button id="btn-cadastrar" onclick="cadastrarPaciente()">+ Adicionar à fila</button>
      </div>

      <div id="mensagem-cadastro" class="mensagem oculto"></div>
    </section>

    <section class="card" id="secao-quadro">
      <div class="cabecalho-quadro">
        <h2>📊 Quadro de Atendimento</h2>
        <div class="filtros">
          <select id="filtro-area" onchange="renderizarTabela()">
            <option value="">Todas as áreas</option>
          </select>
          <select id="filtro-status" onchange="renderizarTabela()">
            <option value="">Todos os status</option>
            <option value="Em Espera">Em Espera</option>
            <option value="Em Atendimento">Em Atendimento</option>
            <option value="Atendido">Atendido</option>
            <option value="Cancelado">Cancelado</option>
          </select>
        </div>
      </div>

      <div id="contadores" class="contadores">
        <!-- Contadores por status — atualizados no js -->
      </div>

      <div class="tabela-wrapper">
        <table id="tabela-pacientes">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Idade</th>
              <th>Área</th>
              <th>Horário</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela">
            <tr><td colspan="6" class="vazio">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
